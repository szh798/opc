              请你基于知识库判断：

              1. 这个用户现在是否已经具备“放大收入”的前提

              2. 当前最主要的增长瓶颈是什么

              3. 最应该优先放大的是获客、销售、交付、还是决策

              4. 给出一个最小AI系统

              5. 给出7天和30天的落地目标


              如果信息已经足够，请直接判断并输出，不要追问太多。

              如果信息不足，最多只追问一个最关键问题。

