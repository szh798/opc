      我会按四个维度帮你盘：能力、资源、认知、关系。
      每完成一个维度，我都会先给你一个小结，最后再给你一份总结报告。
      如果我判断你现在还没有形成清晰资产，我不会硬推下一步，而是会直接指出问题。
      先从最近 3-5 年里，你做成过的一件具体事情说起。
