services:
  postgres:
    image: postgres:16-alpine
    container_name: opc-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: opc
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - opc-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d opc"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  opc-postgres-data:
