app:
  description: 通用兜底对话流——整个系统的统一兜底入口。首登用户自由文本/老用户无话题闲聊/"切回主对话"/"薅羊毛分支点聊点其他的" 等四类场景全部由它接住。最多 3 轮内通过 handoff marker 把用户引向资产盘点 / 全职主营采访 / 园区政策 / 闲聊收集 / 保留自由聊。
  icon: 💬
  icon_background: '#FFF3E0'
  mode: advanced-chat
  name: 一树OPC-通用兜底对话流
  use_icon_as_answer_icon: false
dependencies:
- current_identifier: null
  type: marketplace
  value:
    marketplace_plugin_unique_identifier: langgenius/zhipuai:0.0.24@e0c0e5847fb5f51c3a4620933dc25f6014ed2c8b754fe9ba634d3cc333951bb1
    version: null
kind: app
version: 0.5.0
