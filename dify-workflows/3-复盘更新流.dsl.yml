        targetType: llm
      id: 4300000001-source-4300000002-target
      source: '4300000001'
      sourceHandle: source
      target: '4300000002'
      targetHandle: target
      type: custom
      zIndex: 0
    - data:
        isInLoop: false
        sourceType: llm
        targetType: if-else
      id: 4300000002-source-4300000004-target
      source: '4300000002'
      sourceHandle: source
      target: '4300000004'
      targetHandle: target
