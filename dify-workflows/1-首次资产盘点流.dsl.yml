    opening_statement: |-
      我们来正式盘一下你的底牌。
      这不是一次填表，是一场至少 30 分钟的深度对话。
      我会陪你从五个维度慢慢盘：热爱与价值观、能力、资源、认知、关系。
      每完成一个维度，我会先给你一个小报告，你来确认准不准、有没有要补的，再往下一步走。
      先从最近 3-5 年里，你做成过的一件具体事情说起。
