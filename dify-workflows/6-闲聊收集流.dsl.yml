app:
  description: 闲聊收集流——支持两种入口：(1) refusal：用户在资产盘点流中连续拒绝结构化提问；(2) fulltime_main_intake：用户选"已经全职在做了"后先聊主营要点再导入资产盘点。通过自然聊天暗中收集 L1 事实（身份/技能/资源/痛点/目标 + 主营），等信息成熟再用 [GOTO_*] 交还主路由。
  icon: 💭
  icon_background: '#F3E8FF'
  mode: advanced-chat
  name: 一树OPC-闲聊收集流
  use_icon_as_answer_icon: false
